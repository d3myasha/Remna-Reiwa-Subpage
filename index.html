    // ─── Paper-Design Warp Shader ────────────────────────────────────
    // Ported from @paper-design/shaders — Apache 2.0
    // ─────────────────────────────────────────────────────────────────
    function generateNoiseTexture(gl) {
        const size = 512;
        const data = new Uint8Array(size * size * 4);
        // Value noise: each 2x2 block сглажен
        const blockSize = 4;
        const blocks = size / blockSize;
        const blockData = new Float32Array(blocks * blocks);
        for (let i = 0; i < blockData.length; i++) blockData[i] = Math.random();
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                const bx = Math.floor(x / blockSize);
                const by = Math.floor(y / blockSize);
                const fx = (x % blockSize) / blockSize;
                const fy = (y % blockSize) / blockSize;
                const ix = bx + 1 < blocks ? bx + 1 : bx;
                const iy = by + 1 < blocks ? by + 1 : by;
                const v = blockData[by * blocks + bx] * (1-fx) * (1-fy)
                        + blockData[by * blocks + ix] * fx * (1-fy)
                        + blockData[iy * blocks + bx] * (1-fx) * fy
                        + blockData[iy * blocks + ix] * fx * fy;
                const idx = (y * size + x) * 4;
                const c = v * 256;
                data[idx] = c;
                data[idx+1] = c;
                data[idx+2] = c;
                data[idx+3] = 255;
            }
        }
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        return tex;
    }

    const WARP_VS = `#version 300 es
        in vec2 position;
        out vec2 v_patternUV;
        void main() {
            v_patternUV = position * 0.5 + 0.5;
            gl_Position = vec4(position, 0.0, 1.0);
        }
    `;

    const WARP_FS = `#version 300 es
        precision highp float;

        uniform float u_time;
        uniform float u_proportion;
        uniform float u_softness;
        uniform float u_shape;
        uniform float u_shapeScale;
        uniform float u_distortion;
        uniform float u_swirl;
        uniform float u_swirlIterations;
        uniform float u_colorsCount;
        uniform vec4 u_colors[10];
        uniform sampler2D u_noiseTexture;

        in vec2 v_patternUV;
        out vec4 fragColor;

        #define TWO_PI 6.28318530718

        float randomG(vec2 p) {
            vec2 uv = floor(p) / 100. + .5;
            return texture(u_noiseTexture, fract(uv)).g;
        }
        float valueNoise(vec2 st) {
            vec2 i = floor(st);
            vec2 f = fract(st);
            float a = randomG(i);
            float b = randomG(i + vec2(1.0, 0.0));
            float c = randomG(i + vec2(0.0, 1.0));
            float d = randomG(i + vec2(1.0, 1.0));
            vec2 u = f * f * (3.0 - 2.0 * f);
            float x1 = mix(a, b, u.x);
            float x2 = mix(c, d, u.x);
            return mix(x1, x2, u.y);
        }

        void main() {
            vec2 uv = v_patternUV;
            uv *= .5;
            const float firstFrameOffset = 118.;
            float t = 0.0625 * (u_time + firstFrameOffset);

            float n1 = valueNoise(uv * 1. + t);
            float n2 = valueNoise(uv * 2. - t);
            float angle = n1 * TWO_PI;
            uv.x += 4. * u_distortion * n2 * cos(angle);
            uv.y += 4. * u_distortion * n2 * sin(angle);

            float sw = u_swirl;
            for (int i = 1; i <= 20; i++) {
                if (i >= int(u_swirlIterations)) break;
                float iF = float(i);
                uv.x += sw / iF * cos(t + iF * 1.5 * uv.y);
                uv.y += sw / iF * cos(t + iF * 1. * uv.x);
            }

            float proportion = clamp(u_proportion, 0., 1.);
            float shape = 0.;
            if (u_shape < .5) {
                vec2 chk = uv * (.5 + 3.5 * u_shapeScale);
                shape = .5 + .5 * sin(chk.x) * cos(chk.y);
                shape += .48 * sign(proportion - .5) * pow(abs(proportion - .5), .5);
            } else if (u_shape < 1.5) {
                vec2 stp = uv * (2. * u_shapeScale);
                float f = fract(stp.y);
                shape = smoothstep(.0, .55, f) * (1.0 - smoothstep(.45, 1., f));
                shape += .48 * sign(proportion - .5) * pow(abs(proportion - .5), .5);
            } else {
                float s = 5. * (1. - u_shapeScale);
                float e0 = 0.45 - s;
                float e1 = 0.55 + s;
                shape = smoothstep(min(e0, e1), max(e0, e1), 1.0 - uv.y + 0.3 * (proportion - 0.5));
            }

            float mixer = shape * (u_colorsCount - 1.);
            vec4 gradient = u_colors[0];
            gradient.rgb *= gradient.a;
            float aa = fwidth(shape);
            for (int i = 1; i < 10; i++) {
                if (i >= int(u_colorsCount)) break;
                float m = clamp(mixer - float(i - 1), 0.0, 1.0);
                float localMixerStart = floor(m);
                float soft = .5 * u_softness + fwidth(m);
                float smoothed = smoothstep(max(0., .5 - soft - aa), min(1., .5 + soft + aa), m - localMixerStart);
                m = mix(localMixerStart + smoothed, m, u_softness);
                vec4 c = u_colors[i];
                c.rgb *= c.a;
                gradient = mix(gradient, c, m);
            }

            vec3 color = gradient.rgb;
            color += 1. / 512. * (fract(sin(dot(.014 * gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453123) - .5);
            fragColor = vec4(color, gradient.a);
        }
    `;

    window.initWarpEffect = function(container, opts) {
        if (!container || container._warpInitialized) return;
        container._warpInitialized = true;

        const speed = opts?.speed ?? 0.8;
        const proportion = opts?.proportion ?? 0.55;
        const softness = opts?.softness ?? 0.8;
        const shape = opts?.shape ?? 1; // 0=checks,1=stripes,2=edge
        const shapeScale = opts?.shapeScale ?? 0.05;
        const distortion = opts?.distortion ?? 0.1;
        const swirl = opts?.swirl ?? 0.8;
        const swirlIterations = opts?.swirlIterations ?? 11;
        const rawColors = opts?.colors ?? [
            [0.07, 0.07, 0.07],
            [0.58, 0.44, 1.0],
            [0.07, 0.07, 0.07],
            [0.53, 0.22, 1.0]
        ];

        // Build color array (premultiplied alpha)
        const colorCount = rawColors.length;
        const colors = new Float32Array(40); // 10 * vec4
        for (let i = 0; i < 10; i++) {
            const off = i * 4;
            if (i < colorCount) {
                const c = rawColors[i];
                colors[off] = c[0];
                colors[off+1] = c[1];
                colors[off+2] = c[2];
                colors[off+3] = 1.0;
            } else {
                colors[off] = 0;
                colors[off+1] = 0;
                colors[off+2] = 0;
                colors[off+3] = 0;
            }
        }

        const canvas = document.createElement('canvas');
        canvas.className = 'warp-effect-canvas';

        const gl = canvas.getContext('webgl2', { alpha: true, antialias: false, premultipliedAlpha: false });
        if (!gl) { container._warpInitialized = false; return; }

        // Noise texture
        const noiseTex = generateNoiseTexture(gl);

        // Compile shaders
        function compileShader(src, type) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
                console.error('Shader error:', gl.getShaderInfoLog(s));
                gl.deleteShader(s);
                return null;
            }
            return s;
        }
        const vs = compileShader(WARP_VS, gl.VERTEX_SHADER);
        const fs = compileShader(WARP_FS, gl.FRAGMENT_SHADER);
        if (!vs || !fs) return;

        const program = gl.createProgram();
        gl.attachShader(program, vs);
        gl.attachShader(program, fs);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program link error:', gl.getProgramInfoLog(program));
            return;
        }

        // Full-screen quad
        const vertices = new Float32Array([-1, -1, 3, -1, -1, 3]);
        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        const posLoc = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        // Uniform locations
        const uTime = gl.getUniformLocation(program, 'u_time');
        const uProportion = gl.getUniformLocation(program, 'u_proportion');
        const uSoftness = gl.getUniformLocation(program, 'u_softness');
        const uShape = gl.getUniformLocation(program, 'u_shape');
        const uShapeScale = gl.getUniformLocation(program, 'u_shapeScale');
        const uDistortion = gl.getUniformLocation(program, 'u_distortion');
        const uSwirl = gl.getUniformLocation(program, 'u_swirl');
        const uSwirlIterations = gl.getUniformLocation(program, 'u_swirlIterations');
        const uColors = gl.getUniformLocation(program, 'u_colors');
        const uColorsCount = gl.getUniformLocation(program, 'u_colorsCount');
        const uNoiseTexture = gl.getUniformLocation(program, 'u_noiseTexture');

        gl.useProgram(program);
        gl.uniform1f(uProportion, proportion);
        gl.uniform1f(uSoftness, softness);
        gl.uniform1f(uShape, shape);
        gl.uniform1f(uShapeScale, shapeScale);
        gl.uniform1f(uDistortion, distortion);
        gl.uniform1f(uSwirl, swirl);
        gl.uniform1f(uSwirlIterations, swirlIterations);
        gl.uniform4fv(uColors, colors);
        gl.uniform1f(uColorsCount, colorCount);
        gl.uniform1i(uNoiseTexture, 0);

        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, noiseTex);

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        function resize() {
            const w = container.offsetWidth;
            const h = container.offsetHeight;
            if (w === 0 || h === 0) return;
            canvas.width = w;
            canvas.height = h;
            gl.viewport(0, 0, w, h);
        }
        resize();
        window.addEventListener('resize', resize);

        container.appendChild(canvas);

        let animId;
        function update(timestamp) {
            animId = requestAnimationFrame(update);
            // wrap time modulo 1000 to prevent precision loss on mobile/Chromium
            const t = (timestamp * 0.001 * speed) % 1000.0;
            gl.uniform1f(uTime, t);
            gl.drawArrays(gl.TRIANGLES, 0, 3);
        }
        animId = requestAnimationFrame(update);

        container._warpCleanup = function() {
            cancelAnimationFrame(animId);
            window.removeEventListener('resize', resize);
            // Free GL resources
            if (gl) {
                gl.deleteTexture(noiseTex);
                gl.deleteBuffer(vbo);
                if (program) {
                    const shaders = gl.getAttachedShaders(program);
                    if (shaders) shaders.forEach(function(s) { gl.detachShader(program, s); gl.deleteShader(s); });
                    gl.deleteProgram(program);
                }
                const ext = gl.getExtension('WEBGL_lose_context');
                if (ext) ext.loseContext();
            }
            if (canvas.parentElement) canvas.parentElement.removeChild(canvas);
        };
    };
    </script>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    background: linear-gradient(284deg, var(--bg-gradient-start) 1%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 83%);
    background-attachment: fixed;
    background-color: var(--background);
    color: var(--text-primary);
    line-height: 1.6;
    transition: background-color 0.3s ease, color 0.3s ease;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    background: radial-gradient(ellipse 60% 40% at 50% 50%, var(--bg-glow), transparent 70%);
    z-index: 0;
}

.container {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 20px;
    flex: 1;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 20px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: var(--primary-color);
    display: flex;
    align-items: center;
}

.brand-logo {
    height: 32px;
    width: auto;
    margin-right: 12px;
    border-radius: 4px;
}

.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.btn {
    padding: 10px 20px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-button);

}

}

.card {

.card-header {

/* User Info - Original cards style with info-row */

/* Subscription Info Block - Collapsed */

}
.user-info-collapsed:hover { background: rgba(var(--primary-rgb), 0.06); }

}

/* Subscription Info Block - Expanded */

}

.user-info-expanded .info-label { color: var(--text-secondary); font-weight: 500; }

/* Stats Grid */

/* App Cards Container */

.spoiler-header {

.apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; width: 100%; min-width: 0; box-sizing: border-box; }

.app-card {

}

.modal {

    top: 0;
    left: 0;

    bottom: 0;
    background: rgba(10, 8, 18, 0.80);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 1000;
    align-items: center;
    justify-content: center;

    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: env(safe-area-inset-bottom, 20px);
}
.modal.active { display: flex; }
.modal-content {
    background: var(--panel-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-card);
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--divider);
}
.modal-title {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Twemoji Country Flags", system-ui, -apple-system, Roboto, "Segoe UI", "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
}
.modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s ease;

.modal-close:hover { background: var(--surface-hover); }
.modal-body { padding: 20px; }

.qr-hint { margin-top: 16px; color: var(--text-secondary); text-align: center; }

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(39, 39, 42, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text-primary);
    padding: 14px 24px;
    border-radius: var(--radius-button);
    font-weight: 500;
    opacity: 0;

.h-4 { height: 16px; }

.h-5 { height: 20px; }
.w-6 { width: 24px; }
.h-6 { height: 24px; }

        const HAPP_CRYPTO_CONFIGS = {
            v3: { publicKey: HAPP_PUBLIC_KEY_V3, deepLink: 'happ://crypt3/' },
            v4: { publicKey: HAPP_PUBLIC_KEY_V4, deepLink: 'happ://crypt4/' }
        };

        function createHappCryptoLink(content, version, asLink) {
            try {
                const config = HAPP_CRYPTO_CONFIGS[version];
                if (!config) return null;
                const encrypt = new JSEncrypt();
                encrypt.setPublicKey(config.publicKey);
                const encryptedContent = encrypt.encrypt(content);
                if (!encryptedContent) return null;
                if (asLink) return config.deepLink + encryptedContent;
                return { deepLink: config.deepLink, encryptedContent };
            } catch {
                return null;
            }
        }

        // ── remnawave/subscription-page: template-engine ──
        function templateReplaceLazy(template, lazyValues) {
            let hasReplacement = false;
            const result = template.replace(/\{\{(\w+)\}\}/g, (match, key) => {
                const value = lazyValues[key];
                if (value !== undefined) {
                    const resolved = typeof value === 'function' ? value() : value;
                    if (resolved !== undefined) {
                        hasReplacement = true;
                        return String(resolved);
                    }
                }
                return match;
            });
            return hasReplacement ? result : template;
        }

        function formatButtonLinkWithMetaInfo(template, metaInfo) {
            return templateReplaceLazy(template, {
                USERNAME: metaInfo.username,
                SUBSCRIPTION_LINK: metaInfo.subscriptionUrl,
                HAPP_CRYPT3_LINK: () => createHappCryptoLink(metaInfo.subscriptionUrl, 'v3', true) || 'unknown',
                HAPP_CRYPT4_LINK: () => createHappCryptoLink(metaInfo.subscriptionUrl, 'v4', true) || 'unknown'
            });
        }

        function normalizeGuideButtonType(type) {
            if (type === 'subscription') return 'subscriptionLink';
            if (type === 'copy') return 'copyButton';
            return type || 'external';
        }

        // installation-guide.connector handleButtonClick
        function handleGuideButtonClick(button) {
            const buttonType = normalizeGuideButtonType(button.type);
            const subscriptionUrl = getSubscriptionMetaUrl();
            const username = panelData?.response?.user?.username || '';
            let formattedUrl;

            if (buttonType === 'subscriptionLink' || buttonType === 'copyButton') {
                if (!button.link) return;
                formattedUrl = formatButtonLinkWithMetaInfo(button.link, { subscriptionUrl, username });
            }

            switch (buttonType) {
                case 'copyButton':
                    if (!formattedUrl) return;
                    copyToClipboard(formattedUrl);
                    break;
                case 'external':
                    if (!button.link) return;
                    openExternalButtonLink(button.link);
                    break;
                case 'subscriptionLink':
                    if (!formattedUrl) return;
                    openSubscriptionUrl(formattedUrl);
                    break;
                default:
                    break;
            }
        }

        function openExternalButtonLink(url) {
            try {
                window.open(url, '_blank');
            } catch (error) {
                console.error('Failed to open external URL:', error);
                openLink(url);
            }
        }

        function initializeApp() {
            loadSettings();

        let colorModePreference = 'system';

        function loadSettings() {
            const savedLang = localStorage.getItem('lang') || getBrowserLanguage();
            currentLanguage = savedLang;
            initColorMode();
            initSnowMode();
        }

        function getResolvedColorMode() {
            if (colorModePreference === 'light') return 'light';
            if (colorModePreference === 'dark') return 'dark';
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyColorMode() {
            const resolved = getResolvedColorMode();
            const root = document.documentElement;
            root.classList.remove('color-mode-light', 'color-mode-dark');
            root.classList.add(resolved === 'dark' ? 'color-mode-dark' : 'color-mode-light');
            const meta = document.getElementById('themeColor');
            if (meta) {
                const darkMeta = meta.getAttribute('data-theme-dark');
                const lightMeta = meta.getAttribute('data-theme-light');
                if (darkMeta && lightMeta) {
                    meta.setAttribute('content', resolved === 'dark' ? darkMeta : lightMeta);
                }
            }
            refreshWarpEffectIfNeeded();
        }

        function initColorMode() {
            const saved = localStorage.getItem('colorMode');
            colorModePreference = (saved === 'light' || saved === 'dark') ? saved : 'system';
            if (!colorSchemeMediaQuery) {
                colorSchemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const onSchemeChange = () => {
                    if (colorModePreference === 'system') applyColorMode();
                };
                if (colorSchemeMediaQuery.addEventListener) {
                    colorSchemeMediaQuery.addEventListener('change', onSchemeChange);
                } else if (colorSchemeMediaQuery.addListener) {
                    colorSchemeMediaQuery.addListener(onSchemeChange);
                }
            }
            applyColorMode();
            setupColorModeButtons();
        }

        function setColorMode(mode) {
            colorModePreference = mode;
            if (mode === 'system') {
                localStorage.removeItem('colorMode');
            } else {
                localStorage.setItem('colorMode', mode);
            }
            applyColorMode();
            setupColorModeButtons();
        }

        function setupColorModeButtons() {
            const container = document.getElementById('colorModeButtons');
            if (!container) return;
            const modes = [
                { id: 'system', labelKey: 'colorModeSystem' },
                { id: 'light', labelKey: 'colorModeLight' },
                { id: 'dark', labelKey: 'colorModeDark' },
            ];
            container.innerHTML = modes.map(m => {
                const active = colorModePreference === m.id ? ' btn-primary' : '';
                return `<button type="button" class="btn${active}" data-color-mode="${m.id}">${getHardcodedText(m.labelKey)}</button>`;
            }).join('');
            container.querySelectorAll('[data-color-mode]').forEach(btn => {
                btn.addEventListener('click', () => setColorMode(btn.getAttribute('data-color-mode')));
            });
        }

        function getWarpColors() {
            const resolved = getResolvedColorMode();
            const el = document.getElementById(resolved === 'dark' ? 'warpColorsDark' : 'warpColorsLight');
            if (!el || !el.textContent.trim()) return null;
            try {
                return JSON.parse(el.textContent.trim());
            } catch (e) {
                return null;
            }
        }

        function refreshWarpEffectIfNeeded() {
            const warpCard = document.getElementById('subscription-info-card');
            if (!warpCard || typeof window.initWarpEffect !== 'function') return;
            if (warpCard._warpCleanup) {
                warpCard._warpCleanup();
                warpCard._warpInitialized = false;
            }
            const colors = getWarpColors();
            if (!colors) return;
            window.initWarpEffect(warpCard, {
                speed: 0.8,
                proportion: 0.55,
                distortion: 0.12,
                swirlIterations: 13,
                shape: 1,
                softness: 0.8,
                swirl: 1.0,
                shapeScale: 0.05,
                colors,
            });
            warpCard._warpInitialized = true;
        }

        function getBrowserLanguage() {
            const lang = (navigator.language || navigator.userLanguage).slice(0, 2);
            return appConfig?.locales?.includes(lang) ? lang : (appConfig?.locales?.[0] || 'en');
        }

        function loadAppConfig() {
            fetch('/assets/.app-config-v2.json')
                .then(response => {
                    if (!response.ok) throw new Error(`Failed to load config: ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    appConfig = data;

                    // Set meta tags from baseSettings
                    if (appConfig.baseSettings) {
                        if (appConfig.baseSettings.metaTitle) {
                            document.getElementById('pageTitle').textContent = appConfig.baseSettings.metaTitle;
                        }
                        if (appConfig.baseSettings.metaDescription) {
                            document.getElementById('metaDesc').setAttribute('content', appConfig.baseSettings.metaDescription);
                            
                        }
                    }

                    // Set valid platforms
                    validPlatforms = Object.keys(appConfig.platforms || {}).filter(p => {
                        const platform = appConfig.platforms[p];
                        return platform && platform.apps && platform.apps.length > 0;
                    });

                    // Set language if not already set (now that appConfig is loaded)
                    if (!localStorage.getItem('lang')) {
                        currentLanguage = getBrowserLanguage();
                    }

                    // Setup language buttons
                    setupLanguageButtons();

                    // Update branding
                    updateBranding();

                    // Render header controls
                    renderHeaderControls();

                    // Update all texts
                    updateTexts();
                })
                .catch(error => {
                    console.error('Error loading app config:', error);
                })
                .finally(() => {
                    if (panelData) renderContent();
                });
        }

            const panelDataB64 = '<%= panelData %>';
